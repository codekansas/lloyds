name: Manual Deploy Production (Break Glass)

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::752725527807:role/lloyds-production-github-actions
  ECR_REPOSITORY_URL: 752725527807.dkr.ecr.us-east-1.amazonaws.com/lloyds-production
  ECS_CLUSTER: lloyds-production-cluster
  ECS_SERVICE: lloyds-production
  ECS_CONTAINER_NAME: lloyds-production
  OPENAI_MODERATION_MODEL: gpt-5-mini
  OPENAI_CONSTITUTION_GRADER_MODEL: gpt-5.2

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        id: image
        run: |
          IMAGE_TAG="${GITHUB_SHA::12}"
          IMAGE_URI="${{ env.ECR_REPOSITORY_URL }}:${IMAGE_TAG}"
          IMAGE_LATEST="${{ env.ECR_REPOSITORY_URL }}:latest"

          docker build --platform linux/amd64 -t "$IMAGE_URI" .
          docker tag "$IMAGE_URI" "$IMAGE_LATEST"

          docker push "$IMAGE_URI"
          docker push "$IMAGE_LATEST"

          echo "image_uri=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Deploy to ECS service
        run: scripts/aws/deploy-ecs.sh
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
          ECS_CLUSTER: ${{ env.ECS_CLUSTER }}
          ECS_SERVICE: ${{ env.ECS_SERVICE }}
          ECS_CONTAINER_NAME: ${{ env.ECS_CONTAINER_NAME }}
          IMAGE_URI: ${{ steps.image.outputs.image_uri }}
          APP_ENV: production
          PRISMA_DB_PUSH_ON_BOOT: "true"
          OPENAI_MODEL: ${{ env.OPENAI_MODERATION_MODEL }}
          OPENAI_CONSTITUTION_GRADER_MODEL: ${{ env.OPENAI_CONSTITUTION_GRADER_MODEL }}
