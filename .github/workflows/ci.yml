name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - staging

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: lloyds_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d lloyds_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/lloyds_test?schema=public
      AUTH_SECRET: ci-auth-secret-please-rotate
      AUTH_TRUST_HOST: true
      GOOGLE_CLIENT_ID: ci-google-client-id
      GOOGLE_CLIENT_SECRET: ci-google-client-secret
      GITHUB_CLIENT_ID: ci-github-client-id
      GITHUB_CLIENT_SECRET: ci-github-client-secret
      CRON_SECRET: ci-cron-secret-please-rotate
      E2E_TEST_MODE: true
      PLAYWRIGHT_BASE_URL: http://127.0.0.1:3001

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Apply Prisma schema
        run: npm run prisma:push

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: End-to-end tests
        run: npm run e2e
